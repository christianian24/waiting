<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>I’ll Be Here.</title>
    <link rel="Shortcut Icon" href="https://i.loli.net/2019/02/13/5c62f60e194c3.png" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--Audio Controls-->
    <div class="audio-container">
        <div id="audio-btn" class="audio-controls" title="Toggle Music">
            <svg viewBox="0 0 24 24">
                <!-- Default to Muted Icon until interacted -->
                <path
                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
            </svg>
        </div>
        <div class="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <!--Avatar-->
    <div class="avatar-container">
        <div id="avatar-speech" class="speech-bubble"></div>
        <div class="charge-ring-container">
            <div id="charge-ring" class="charge-ring"></div>
            <img src="https://media.tenor.com/YX7uvNo4bgEAAAAi/peach-goma-peach-and-goma.gif" id="logo" alt="Avatar">
        </div>
    </div>

    <!--Particle Canvas-->
    <canvas class="canvas" width="1820" height="905"></canvas>

    <!--Countdown Text-->
    <div class="text">
        <p>For: <span id="span_dt_dt"></span></p>
        <p class="promise-text">I’ll keep my promise. I’ll be here, waiting for you ♡</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container" title="The Wait Progress">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">0.0000%</div>

    <!-- Time Capsule -->
    <div id="time-capsule" class="time-capsule" title="Time Capsule">
        <span>🔒︎</span>
        <div class="tooltip" id="time-capsule-tooltip">Not yet...</div>
    </div>

    <!-- Secret Modal Easter Egg -->
    <div class="secret-modal" id="secret-modal">
        <h2>You found me! ♡</h2>
        <p>You unlocked the secret message.<br>I will love you and keep my promise.</p>
    </div>

    <!-- Envelope Modal -->
    <div class="secret-modal" id="envelope-modal">
        <h2>Hello La,</h2>
        <p>I’m thinking of you every second, even if you don’t know it. Just a little longer... I love you.</p>
    </div>

    <!--Audio-->
    <audio loop="loop" id="background_music">
        <source src="mp3/waiting.mp3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
</body>

</html>
